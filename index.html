<body>
<div class="screen-flash" id="screenFlash"></div>
<div class="team-gate" id="teamGate"><div class="team-card"><h2 data-i18n="teamTitle">Join activity</h2><p data-i18n="teamHelp">Write your team name to connect with the projected board.</p><input id="teamNameInput" type="text" maxlength="32" placeholder="Team 1"><button type="button" onclick="joinAsStudent()" data-i18n="join">Join</button></div></div>
<main class="app">
<header class="header">
<div class="brand"><svg class="brand-logo" viewBox="0 0 80 80"><rect x="9" y="7" width="27" height="39" rx="6" fill="#1684f2"/><rect x="45" y="8" width="27" height="19" rx="5" fill="#f06a21"/><rect x="9" y="54" width="27" height="18" rx="5" fill="#08a9c7"/><rect x="45" y="36" width="27" height="36" rx="6" fill="#f3b51d"/></svg><div class="brand-title" data-i18n="title">Facilitator Board</div></div>
<div class="header-actions"><span class="mode-badge" id="modeBadge">Teacher</span><div class="lang-switch"><button class="lang-btn active" type="button" data-lang-btn="en" onclick="setLanguage('en')">EN</button><button class="lang-btn" type="button" data-lang-btn="es" onclick="setLanguage('es')">ES</button></div><button class="icon-btn teacher-only" type="button" onclick="openQrModal()">▦ <span class="btn-text" data-i18n="qrAccess">QR Access</span></button><button class="icon-btn" type="button" onclick="toggleFullscreen()">⛶ <span class="btn-text" data-i18n="fullscreen">Fullscreen</span></button></div>
</header>
<section class="timer-section"><span class="timer-display" id="display">01:00</span><div class="remote-alert" id="remoteAlert"></div>
<div class="timer-controls teacher-only"><div class="presets"><button class="preset-btn" type="button" onclick="setPreset(30,this)">30s</button><button class="preset-btn active" type="button" onclick="setPreset(60,this)">1 min</button><button class="preset-btn" type="button" onclick="setPreset(120,this)">2 min</button><button class="preset-btn" type="button" onclick="setPreset(300,this)">5 min</button><button class="preset-btn" type="button" onclick="setPreset(600,this)">10 min</button></div><div class="custom-time"><input class="time-input" id="secondsInput" type="number" min="1" max="99999" value="0"><button class="set-btn" type="button" onclick="setCustom()" data-i18n="set">Set</button></div></div>
<div class="main-actions"><button class="control-btn start-btn teacher-only" id="startBtn" type="button" onclick="startTimer()">▶ <span data-i18n="start">Start</span></button><button class="control-btn pause-btn teacher-only" id="pauseBtn" type="button" onclick="pauseTimer()" style="display:none">⏸ <span data-i18n="pause">Pause</span></button><button class="control-btn reset-btn teacher-only" type="button" onclick="resetTimer()">↺ <span data-i18n="reset">Reset</span></button><button class="control-btn stop-challenge-btn" type="button" onclick="stopChallengeFromThisDevice()">■ <span data-i18n="stopChallenge">Stop Challenge</span></button></div>
<div class="progress-wrap"><div class="progress-bar" id="progress"></div></div></section>
<section class="sound-section"><div class="sound-heading" data-i18n="soundHeading">♪ Sound effects — click anytime</div><div class="sound-grid" id="soundGrid"></div></section>
</main>
<div class="modal" id="qrModal"><div class="modal-card"><div class="modal-head"><h3 data-i18n="qrTitle">Student QR</h3><button class="close-btn" type="button" onclick="closeQrModal()">×</button></div><div class="modal-body"><div class="qr-box"><img id="qrImage" alt="QR Code"></div><div class="qr-info"><p data-i18n="qrInfo">Students scan this QR to join as a team. They can view the timer, stop the challenge and use limited sounds.</p><input id="qrUrl" readonly></div></div></div></div>
<div class="watermark"><svg viewBox="0 0 80 80"><rect x="9" y="7" width="27" height="39" rx="6" fill="#1684f2"/><rect x="45" y="8" width="27" height="19" rx="5" fill="#f06a21"/><rect x="9" y="54" width="27" height="18" rx="5" fill="#08a9c7"/><rect x="45" y="36" width="27" height="36" rx="6" fill="#f3b51d"/></svg><span>Developed by Will Rangel</span></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getDatabase,ref,set,update,onValue,push,serverTimestamp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
const firebaseConfig={apiKey:"AIzaSyCY1Vllaa1a5m5sj2sGL3VH5NkA2l5ZKD8",authDomain:"facilitator-board-will-rangel.firebaseapp.com",databaseURL:"https://facilitator-board-will-rangel-default-rtdb.firebaseio.com/",projectId:"facilitator-board-will-rangel",storageBucket:"facilitator-board-will-rangel.firebasestorage.app",messagingSenderId:"1016972675448",appId:"1:1016972675448:web:20ac33e6a7e2c79168208d"};
const app=initializeApp(firebaseConfig),db=getDatabase(app),params=new URLSearchParams(location.search);let sessionId=params.get("session")||localStorage.getItem("facilitatorSessionId")||`room-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,7)}`,mode=params.get("mode")==="student"?"student":"teacher",teamName=localStorage.getItem("facilitatorTeamName")||"",lastSeenSoundId=null,lastSeenStopId=null;localStorage.setItem("facilitatorSessionId",sessionId);
const isTeacher=mode==="teacher",stateRef=ref(db,`sessions/${sessionId}/state`);
const I18N={en:{title:"Facilitator Board",fullscreen:"Fullscreen",qrAccess:"QR Access",qrTitle:"Student QR",qrInfo:"Students scan this QR to join as a team. They can view the timer, stop the challenge and use limited sounds.",set:"Set",start:"Start",pause:"Pause",reset:"Reset",stopChallenge:"Stop Challenge",soundHeading:"♪ Sound effects — click anytime",teamTitle:"Join activity",teamHelp:"Write your team name to connect with the projected board.",join:"Join",stoppedBy:"stopped the challenge",sounds:{airHorn:"Air Horn",bell:"Bell",applause:"Applause",success:"Success!",buzzer:"Buzzer",beep:"Beep",fanfare:"Fanfare",whistle:"Whistle",laugh:"Ha Ha Ha",duck:"Duck",chicken:"Chicken",monkey:"Monkey"}},es:{title:"Panel del Facilitador",fullscreen:"Pantalla completa",qrAccess:"Acceso QR",qrTitle:"QR para estudiantes",qrInfo:"Los estudiantes escanean este QR para entrar como equipo. Pueden ver el tiempo, detener el reto y usar sonidos limitados.",set:"Asignar",start:"Iniciar",pause:"Pausar",reset:"Reiniciar",stopChallenge:"Detener reto",soundHeading:"♪ Efectos de sonido — clic en cualquier momento",teamTitle:"Entrar a la actividad",teamHelp:"Escribe el nombre de tu equipo para conectarte con la pantalla proyectada.",join:"Entrar",stoppedBy:"detuvo el reto",sounds:{airHorn:"Bocina",bell:"Campana",applause:"Aplausos",success:"¡Éxito!",buzzer:"Error",beep:"Beep",fanfare:"Fanfarria",whistle:"Silbato",laugh:"Risa",duck:"Pato",chicken:"Pollo",monkey:"Mono"}}};let currentLang="en";
const display=document.getElementById("display"),progress=document.getElementById("progress"),startBtn=document.getElementById("startBtn"),pauseBtn=document.getElementById("pauseBtn"),secondsInput=document.getElementById("secondsInput"),screenFlash=document.getElementById("screenFlash"),soundGrid=document.getElementById("soundGrid"),remoteAlert=document.getElementById("remoteAlert"),qrModal=document.getElementById("qrModal"),qrImage=document.getElementById("qrImage"),qrUrl=document.getElementById("qrUrl");
if(!isTeacher){document.body.classList.add("student");document.getElementById("modeBadge").textContent="Student";if(!teamName)document.getElementById("teamGate").classList.add("active")}else{document.getElementById("modeBadge").textContent="Teacher";set(ref(db,`sessions/${sessionId}/meta`),{createdAt:serverTimestamp(),owner:"teacher"});set(stateRef,{total:60,remaining:60,running:false,updatedAt:Date.now()})}
let ac=null;function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==="suspended")ac.resume();return ac}function tone(f=440,d=.25,v=.35,start=0,type="sine",to=null){const c=getAC(),t=c.currentTime+start,o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.setValueAtTime(f,t);if(to)o.frequency.exponentialRampToValueAtTime(Math.max(1,to),t+d*.9);g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+d+.04)}
function noise(start=0,d=.4,v=.25){const c=getAC(),t=c.currentTime+start,size=Math.floor(c.sampleRate*d),buf=c.createBuffer(1,size,c.sampleRate),data=buf.getChannelData(0);for(let i=0;i<size;i++){data[i]=(Math.random()*2-1)*Math.min(1,i/(size*.08))*Math.min(1,(size-i)/(size*.2))}const s=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();s.buffer=buf;f.type="bandpass";f.frequency.value=1500;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);s.connect(f);f.connect(g);g.connect(c.destination);s.start(t)}
function airHorn(){tone(390,1.45,.82,0,"sawtooth",165)}function bell(){[880,1760,2640].forEach((f,i)=>tone(f,2.3,.45/(i+1),0,"sine"))}function applause(){for(let i=0;i<10;i++)noise(i*.13,.32,.24);noise(.04,1.6,.22)}function success(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,.34,.36,i*.09));setTimeout(()=>[523,659,784,1047,1319].forEach((f,i)=>tone(f,.34,.36,i*.09)),560)}function buzzer(){tone(220,.75,.64,0,"sawtooth",72);setTimeout(()=>tone(220,.75,.64,0,"sawtooth",72),480)}function beep(){[0,.18,.42,.60].forEach(s=>tone(1050,.14,.36,s))}function fanfare(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,.34,.38,i*.15,"sawtooth"))}function whistle(){tone(1550,.72,.48,0,"sine",2400);tone(1500,.55,.4,.52,"sine",2200)}function laugh(){for(let i=0;i<6;i++)tone(282+i*25,.18,.36,i*.17,"sine",215+i*18)}function duck(){[0,.34,.68].forEach(s=>tone(470,.25,.48,s,"sawtooth",195))}function chicken(){[850,620,950,500,780,430,900,530].forEach((f,i)=>tone(f,.08,.25,i*.08,"square",f*.68))}function monkey(){[0,.17,.34,.51].forEach((s,i)=>tone(480+i*45,.16,.44,s,"sine",720-i*35));tone(260,.72,.16,.02,"triangle",390)}function timerEndSound(){[0,.28,.56].forEach(s=>tone(920,.24,.56,s));setTimeout(buzzer,820)}
function svgIcon(n){const p={horn:'<path d="M8 38h9l22-13v30L17 42H8z"/><path d="M44 31c6 5 6 14 0 19"/><path d="M53 25c11 10 11 30 0 40"/>',bell:'<path d="M25 55h30"/><path d="M30 55V35a10 10 0 0 1 20 0v20"/><path d="M36 61h8"/><path d="M35 23a8 8 0 0 1 10 0"/>',clap:'<path d="M24 45V25M32 47V20M40 47V24M48 48V29"/><path d="M24 45c0 14 10 22 22 22 10 0 17-7 17-18V36"/>',trophy:'<path d="M27 18h26v13c0 9-6 17-13 17s-13-8-13-17z"/><path d="M27 25H16c0 12 5 18 14 19"/><path d="M53 25h11c0 12-5 18-14 19"/><path d="M40 48v12"/><path d="M30 64h20"/>',x:'<path d="M23 23l34 34M57 23L23 57"/><circle cx="40" cy="40" r="25"/>',sound:'<path d="M20 45h10l14 12V23L30 35H20z"/><path d="M52 34c4 4 4 8 0 12"/><path d="M59 29c8 8 8 22 0 30"/>',note:'<path d="M30 54V23l26-5v30"/><circle cx="24" cy="56" r="8"/><circle cx="50" cy="50" r="8"/>',smile:'<circle cx="40" cy="40" r="24"/><path d="M30 35h.1M50 35h.1"/><path d="M29 48c7 7 15 7 22 0"/>'};return`<svg viewBox="0 0 80 80">${p[n]||p.sound}</svg>`}
const SOUNDS=[{key:"airHorn",icon:"horn",tone:"#c91f36",fn:airHorn,student:true},{key:"bell",icon:"bell",tone:"#2e5dcc",fn:bell,student:true},{key:"applause",icon:"clap",tone:"#c22567",fn:applause,student:true},{key:"success",icon:"trophy",tone:"#4540b5",fn:success,student:true},{key:"buzzer",icon:"x",tone:"#4d7c0f",fn:buzzer,student:false},{key:"beep",icon:"bell",tone:"#bd1748",fn:beep,student:false},{key:"fanfare",icon:"sound",tone:"#c86408",fn:fanfare,student:false},{key:"whistle",icon:"note",tone:"#157f95",fn:whistle,student:false},{key:"laugh",icon:"smile",tone:"#7434d6",fn:laugh,student:false},{key:"duck",icon:"sound",tone:"#16823c",fn:duck,student:false},{key:"chicken",icon:"sound",tone:"#cf4e0b",fn:chicken,student:false},{key:"monkey",icon:"sound",tone:"#0f6b63",fn:monkey,student:false}];
function renderSounds(){soundGrid.innerHTML="";const labels=I18N[currentLang].sounds;SOUNDS.filter(s=>isTeacher||s.student).forEach(item=>{const btn=document.createElement("button");btn.type="button";btn.className="sound-btn";btn.style.setProperty("--tone",item.tone);btn.innerHTML=`<span class="sound-icon">${svgIcon(item.icon)}</span><span class="sound-label">${labels[item.key]}</span>`;btn.onclick=e=>{item.fn();sendSoundEvent(item.key);btn.classList.remove("playing");void btn.offsetWidth;btn.classList.add("playing");setTimeout(()=>btn.classList.remove("playing"),600)};soundGrid.appendChild(btn)})}
window.setLanguage=lang=>{currentLang=lang;document.documentElement.lang=lang;document.querySelectorAll("[data-lang-btn]").forEach(b=>b.classList.toggle("active",b.dataset.langBtn===lang));document.querySelectorAll("[data-i18n]").forEach(n=>{const k=n.dataset.i18n;if(I18N[lang][k])n.textContent=I18N[lang][k]});renderSounds();refresh()};
let total=60,remaining=60,interval=null,running=false;function fmt(s){return`${String(Math.floor(Math.max(0,s)/60)).padStart(2,"0")}:${String(Math.max(0,s)%60).padStart(2,"0")}`}function refresh(){display.textContent=fmt(remaining);display.className="timer-display";progress.className="progress-bar";if(remaining<=0){display.classList.add("done");progress.classList.add("danger")}else if(remaining<=10){display.classList.add("danger");progress.classList.add("danger")}progress.style.width=`${total>0?Math.max(0,(remaining/total)*100):0}%`}
function syncState(){if(isTeacher)set(stateRef,{total,remaining,running,updatedAt:Date.now()})}function clearActive(){document.querySelectorAll(".preset-btn").forEach(b=>b.classList.remove("active"))}
window.setPreset=(s,el)=>{if(!isTeacher||running)return;total=s;remaining=s;clearActive();if(el)el.classList.add("active");refresh();syncState()};window.setCustom=()=>{if(!isTeacher||running)return;const v=parseInt(secondsInput.value,10);if(v>0){total=Math.min(v,99999);remaining=total;clearActive();refresh();syncState()}};
window.startTimer=()=>{if(!isTeacher||running||remaining<=0)return;getAC();running=true;startBtn.style.display="none";pauseBtn.style.display="inline-flex";syncState();interval=setInterval(()=>{remaining--;if(remaining<=0){remaining=0;clearInterval(interval);running=false;startBtn.style.display="inline-flex";pauseBtn.style.display="none";refresh();syncState();endSignal();return}refresh();syncState()},1000)};
function pauseLocal(){clearInterval(interval);running=false;startBtn.style.display="inline-flex";pauseBtn.style.display="none";refresh()}window.pauseTimer=()=>{if(!isTeacher||!running)return;pauseLocal();syncState()};window.resetTimer=()=>{if(!isTeacher)return;clearInterval(interval);running=false;remaining=total;startBtn.style.display="inline-flex";pauseBtn.style.display="none";remoteAlert.classList.remove("active");refresh();syncState();update(ref(db,`sessions/${sessionId}`),{lastStop:null})};
function endSignal(){timerEndSound();screenFlash.classList.remove("active");void screenFlash.offsetWidth;screenFlash.classList.add("active")}
secondsInput.addEventListener("keydown",e=>{if(e.key==="Enter")window.setCustom()});
function sendSoundEvent(key){push(ref(db,`sessions/${sessionId}/events/sounds`),{key,by:isTeacher?"teacher":teamName,mode,createdAt:serverTimestamp()})}
onValue(stateRef,snap=>{if(isTeacher)return;const st=snap.val();if(!st)return;total=+st.total||60;remaining=+st.remaining||0;running=!!st.running;refresh()});
onValue(ref(db,`sessions/${sessionId}/events/sounds`),snap=>{const data=snap.val();if(!data)return;const entries=Object.entries(data),[id,event]=entries[entries.length-1]||[];if(!id||id===lastSeenSoundId)return;lastSeenSoundId=id;if(event&&event.mode!==mode){const item=SOUNDS.find(s=>s.key===event.key);if(item)item.fn()}});
onValue(ref(db,`sessions/${sessionId}/lastStop`),snap=>{const stop=snap.val();if(!stop||stop.id===lastSeenStopId)return;lastSeenStopId=stop.id;if(isTeacher&&running)pauseLocal();showStopAlert(stop.team||"Team");endSignal()});
function showStopAlert(team){remoteAlert.textContent=`${team} ${I18N[currentLang].stoppedBy}`;remoteAlert.classList.add("active");setTimeout(()=>remoteAlert.classList.remove("active"),5200)}
window.joinAsStudent=()=>{const value=(document.getElementById("teamNameInput").value||"").trim();if(!value)return;teamName=value.slice(0,32);localStorage.setItem("facilitatorTeamName",teamName);set(ref(db,`sessions/${sessionId}/teams/${teamName.replace(/[.#$/[\]]/g,"-")}`),{name:teamName,joinedAt:serverTimestamp()});document.getElementById("teamGate").classList.remove("active");document.getElementById("modeBadge").textContent=teamName};
window.stopChallengeFromThisDevice=()=>{if(!isTeacher&&!teamName){document.getElementById("teamGate").classList.add("active");return}const payload={id:`${Date.now()}-${Math.random().toString(16).slice(2)}`,team:isTeacher?"Teacher":teamName,byMode:mode,createdAt:serverTimestamp()};update(ref(db,`sessions/${sessionId}`),{lastStop:payload});push(ref(db,`sessions/${sessionId}/stops`),payload);if(!isTeacher)beep()};
window.openQrModal=()=>{const base=location.href.split("?")[0].split("#")[0],url=`${base}?mode=student&session=${encodeURIComponent(sessionId)}`;qrUrl.value=url;qrImage.src=`https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=8&data=${encodeURIComponent(url)}`;qrModal.classList.add("active")};window.closeQrModal=()=>qrModal.classList.remove("active");qrModal.onclick=e=>{if(e.target===qrModal)window.closeQrModal()};window.toggleFullscreen=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()};
window.setLanguage("en");refresh();if(!isTeacher&&teamName)document.getElementById("modeBadge").textContent=teamName;
</script>
</body>
</html>
