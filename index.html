<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 Facilitator Board</title>
<style>
:root {
  --bg:#0d0d1a;--surface:#1a1a2e;--surface2:#16213e;
  --accent:#7c3aed;--accent2:#06b6d4;
  --text:#e2e8f0;--muted:#94a3b8;--radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:var(--surface);
  border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-title{font-size:1.1rem;font-weight:800;
  background:linear-gradient(135deg,#7c3aed,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.fs-btn{background:rgba(255,255,255,.08);border:none;color:var(--muted);
  padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;
  transition:all .2s}
.fs-btn:hover{background:rgba(255,255,255,.16);color:var(--text)}

/* ── TIMER SECTION ── */
.timer-sec{background:var(--surface);padding:22px 28px 18px;
  border-bottom:1px solid rgba(255,255,255,.06)}
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:18px}
.timer-display{font-size:5.5rem;font-weight:900;font-variant-numeric:tabular-nums;
  letter-spacing:3px;line-height:1;
  text-shadow:0 0 40px rgba(124,58,237,.45);transition:color .3s,text-shadow .3s}
.timer-display.warn{color:#f59e0b;text-shadow:0 0 30px rgba(245,158,11,.55)}
.timer-display.danger{color:#ef4444;text-shadow:0 0 30px rgba(239,68,68,.6)}
.timer-display.done{color:#ef4444;animation:blink .5s infinite alternate}
@keyframes blink{from{opacity:1;transform:scale(1)}to{opacity:.5;transform:scale(1.03)}}
.over-msg{display:none;font-size:1.6rem;font-weight:800;color:#ef4444;
  animation:dropIn .4s ease;letter-spacing:1px}
@keyframes dropIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

.timer-controls{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap}
.presets{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.pst-btn{background:var(--surface2);border:1px solid rgba(255,255,255,.1);
  color:var(--muted);padding:7px 16px;border-radius:20px;cursor:pointer;
  font-size:.88rem;font-weight:700;transition:all .2s}
.pst-btn:hover{background:rgba(124,58,237,.25);border-color:var(--accent);color:var(--text)}
.pst-btn.active-preset{background:rgba(124,58,237,.35);border-color:var(--accent);color:var(--text)}

.input-wrap{display:flex;align-items:center;gap:7px}
.min-inp{background:var(--surface2);border:1px solid rgba(255,255,255,.15);
  color:var(--text);padding:7px 10px;border-radius:12px;
  font-size:.95rem;width:80px;text-align:center;outline:none;transition:border-color .2s}
.min-inp:focus{border-color:var(--accent)}
.set-btn{background:var(--accent);border:none;color:#fff;padding:7px 16px;
  border-radius:12px;cursor:pointer;font-size:.88rem;font-weight:700;transition:filter .2s}
.set-btn:hover{filter:brightness(1.2)}

.t-actions{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.t-btn{padding:11px 30px;border:none;border-radius:14px;font-size:1.05rem;
  font-weight:800;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:7px}
.t-btn:active{transform:scale(.94)}
.btn-start{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff}
.btn-pause{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.btn-reset{background:rgba(255,255,255,.07);color:var(--muted);
  border:1px solid rgba(255,255,255,.1)}
.btn-reset:hover{background:rgba(255,255,255,.14);color:var(--text)}

/* ── PROGRESS BAR ── */
.prog-bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:16px}
.prog-bar{height:100%;border-radius:2px;transition:width .95s linear,background .3s;
  background:linear-gradient(90deg,#7c3aed,#06b6d4)}
.prog-bar.warn{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.prog-bar.danger{background:linear-gradient(90deg,#ef4444,#f87171)}

/* ── SOUND SECTION ── */
.snd-sec{flex:1;padding:18px 22px 24px;overflow-y:auto}
.snd-heading{font-size:.78rem;font-weight:700;text-transform:uppercase;
  letter-spacing:2.5px;color:var(--muted);text-align:center;margin-bottom:14px}
.snd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));
  gap:11px;max-width:1200px;margin:0 auto}

.snd-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:18px 10px;border:none;border-radius:var(--radius);cursor:pointer;
  font-weight:700;color:#fff;transition:transform .15s,filter .15s;
  position:relative;overflow:hidden;min-height:106px;user-select:none}
.snd-btn:hover{filter:brightness(1.12);transform:translateY(-2px)}
.snd-btn:active{transform:scale(.92)!important}
.snd-btn.flash::after{content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.28);border-radius:var(--radius);
  animation:flash .25s ease forwards}
@keyframes flash{from{opacity:1}to{opacity:0}}
.snd-icon{font-size:2rem;line-height:1;pointer-events:none}
.snd-label{font-size:.78rem;text-align:center;line-height:1.25;pointer-events:none}

/* colors */
.c0{background:linear-gradient(135deg,#dc2626,#9f1239)}
.c1{background:linear-gradient(135deg,#d97706,#92400e)}
.c2{background:linear-gradient(135deg,#2563eb,#1e3a8a)}
.c3{background:linear-gradient(135deg,#0891b2,#164e63)}
.c4{background:linear-gradient(135deg,#7c3aed,#4c1d95)}
.c5{background:linear-gradient(135deg,#db2777,#831843)}
.c6{background:linear-gradient(135deg,#16a34a,#14532d)}
.c7{background:linear-gradient(135deg,#ea580c,#7c2d12)}
.c8{background:linear-gradient(135deg,#0f766e,#042f2e)}
.c9{background:linear-gradient(135deg,#4f46e5,#312e81)}
.c10{background:linear-gradient(135deg,#65a30d,#365314)}
.c11{background:linear-gradient(135deg,#e11d48,#881337)}

/* ripple */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);
  transform:scale(0);animation:ripple .55s linear;pointer-events:none}
@keyframes ripple{to{transform:scale(5);opacity:0}}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

@media(max-width:600px){
  .timer-display{font-size:3.8rem}
  .snd-grid{grid-template-columns:repeat(3,1fr)}
  .t-btn{padding:9px 18px;font-size:.92rem}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <span style="font-size:1.3rem">🎓</span>
  <span class="hdr-title">Facilitator Board</span>
  <button class="fs-btn" onclick="toggleFS()">⛶ Fullscreen</button>
</div>

<!-- TIMER -->
<div class="timer-sec">
  <div class="timer-wrap">
    <div class="timer-display" id="disp">01:00</div>
    <div class="over-msg" id="overMsg">⏰ Time is over!</div>
  </div>

  <div class="timer-controls">
    <div class="presets" id="presets">
      <button class="pst-btn" onclick="setPreset(30,this)">30s</button>
      <button class="pst-btn active-preset" onclick="setPreset(60,this)">1 min</button>
      <button class="pst-btn" onclick="setPreset(120,this)">2 min</button>
      <button class="pst-btn" onclick="setPreset(300,this)">5 min</button>
      <button class="pst-btn" onclick="setPreset(600,this)">10 min</button>
    </div>
    <div class="input-wrap">
      <input class="min-inp" type="number" id="secInput" placeholder="sec" min="1" max="9999">
      <button class="set-btn" onclick="setCustom()">Set</button>
    </div>
  </div>

  <div class="t-actions">
    <button class="t-btn btn-start" id="startBtn" onclick="startTimer()">▶ Start</button>
    <button class="t-btn btn-pause" id="pauseBtn" onclick="pauseTimer()" style="display:none">⏸ Pause</button>
    <button class="t-btn btn-reset" onclick="resetTimer()">↺ Reset</button>
  </div>

  <div class="prog-bar-wrap">
    <div class="prog-bar" id="prog" style="width:100%"></div>
  </div>
</div>

<!-- SOUNDBOARD -->
<div class="snd-sec">
  <div class="snd-heading">🎵 Sound Effects — click anytime</div>
  <div class="snd-grid" id="grid"></div>
</div>

<script>
// ── AUDIO CONTEXT ─────────────────────────────────────────
let ac=null;
function getAC(){
  if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)();
  if(ac.state==='suspended') ac.resume();
  return ac;
}

// ── SOUND FUNCTIONS ───────────────────────────────────────
function airHorn(){
  const c=getAC(),o=c.createOscillator(),g=c.createGain(),w=c.createWaveShaper();
  const cv=new Float32Array(256);
  for(let i=0;i<256;i++){const x=(i*2/256)-1;cv[i]=(Math.PI+300)*x/(Math.PI+300*Math.abs(x));}
  w.curve=cv; o.type='sawtooth';
  o.frequency.setValueAtTime(380,c.currentTime);
  o.frequency.exponentialRampToValueAtTime(180,c.currentTime+1.6);
  g.gain.setValueAtTime(.85,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+1.6);
  o.connect(w);w.connect(g);g.connect(c.destination);
  o.start();o.stop(c.currentTime+1.7);
}

function fanfare(){
  const c=getAC();
  [523,659,784,1047,1319].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sawtooth'; o.frequency.value=f;
    const t=c.currentTime+i*.18;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(.38,t+.04);
    g.gain.exponentialRampToValueAtTime(.001,t+.32);
    o.connect(g);g.connect(c.destination);
    o.start(t);o.stop(t+.35);
  });
}

function bell(){
  const c=getAC();
  [[880,.5],[1760,.2],[2640,.08],[3520,.04]].forEach(([f,v])=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+3);
    o.connect(g);g.connect(c.destination);
    o.start();o.stop(c.currentTime+3.1);
  });
}

function whistle(){
  const c=getAC(),o=c.createOscillator(),g=c.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(1600,c.currentTime);
  o.frequency.linearRampToValueAtTime(2300,c.currentTime+.08);
  o.frequency.linearRampToValueAtTime(1700,c.currentTime+.6);
  g.gain.setValueAtTime(.5,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.7);
  o.connect(g);g.connect(c.destination);
  o.start();o.stop(c.currentTime+.75);
}

function laugh(){
  const c=getAC();
  for(let i=0;i<6;i++){
    const o=c.createOscillator(),g=c.createGain();
    const lfo=c.createOscillator(),lg=c.createGain();
    o.type='sine'; o.frequency.value=280+i*25;
    lfo.frequency.value=9; lg.gain.value=70;
    lfo.connect(lg);lg.connect(o.frequency);
    const t=c.currentTime+i*.2;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(.42,t+.04);
    g.gain.exponentialRampToValueAtTime(.001,t+.18);
    o.connect(g);g.connect(c.destination);
    lfo.start(t);o.start(t);o.stop(t+.22);lfo.stop(t+.22);
  }
}

function applause(){
  const c=getAC();
  const sz=c.sampleRate*2,buf=c.createBuffer(1,sz,c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<sz;i++){
    const env=i<sz*.08?i/(sz*.08):i>sz*.75?(sz-i)/(sz*.25):1;
    d[i]=(Math.random()*2-1)*env;
  }
  const src=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();
  f.type='bandpass';f.frequency.value=1300;f.Q.value=.4;
  src.buffer=buf;
  g.gain.setValueAtTime(.65,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+2.2);
  src.connect(f);f.connect(g);g.connect(c.destination);src.start();
}

function duck(){
  const c=getAC();
  [0,.38].forEach(off=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sawtooth';
    const t=c.currentTime+off;
    o.frequency.setValueAtTime(450,t);
    o.frequency.exponentialRampToValueAtTime(200,t+.22);
    g.gain.setValueAtTime(.55,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.26);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.3);
  });
}

function chicken(){
  const c=getAC();
  [850,620,950,500,780,430].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='square'; const t=c.currentTime+i*.09;
    o.frequency.setValueAtTime(f,t);
    o.frequency.linearRampToValueAtTime(f*.65,t+.07);
    g.gain.setValueAtTime(.28,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.08);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.1);
  });
}

function monkey(){
  const c=getAC();
  const o=c.createOscillator(),g=c.createGain();
  const lfo=c.createOscillator(),lg=c.createGain();
  o.type='sine'; o.frequency.value=480;
  lfo.frequency.value=5.5; lg.gain.value=220;
  lfo.connect(lg);lg.connect(o.frequency);
  [0,.18,.36].forEach(t=>{
    g.gain.setValueAtTime(.55,c.currentTime+t);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.16);
  });
  lfo.start();o.connect(g);g.connect(c.destination);
  o.start();o.stop(c.currentTime+.75);lfo.stop(c.currentTime+.75);
}

function success(){
  const c=getAC();
  [523,659,784,1047,1319].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine'; o.frequency.value=f;
    const t=c.currentTime+i*.1;
    g.gain.setValueAtTime(.42,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.35);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.4);
  });
}

function buzzer(){
  const c=getAC(),o=c.createOscillator(),g=c.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(220,c.currentTime);
  o.frequency.linearRampToValueAtTime(70,c.currentTime+.65);
  g.gain.setValueAtTime(.75,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.65);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.7);
}

function beep(){
  const c=getAC();
  [0,.22].forEach(off=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine'; o.frequency.value=1050;
    const t=c.currentTime+off;
    g.gain.setValueAtTime(.42,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.16);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.2);
  });
}

function timerEndSound(){
  const c=getAC();
  [0,.28,.56].forEach(off=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine'; o.frequency.value=900;
    const t=c.currentTime+off;
    g.gain.setValueAtTime(.55,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.22);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.28);
  });
}

// ── SOUND BUTTONS ─────────────────────────────────────────
const SOUNDS=[
  {l:'Air Horn',   i:'📢',fn:airHorn},
  {l:'Fanfare',    i:'🎺',fn:fanfare},
  {l:'Bell',       i:'🔔',fn:bell},
  {l:'Whistle',    i:'🎵',fn:whistle},
  {l:'Ha Ha Ha',   i:'😂',fn:laugh},
  {l:'Applause',   i:'👏',fn:applause},
  {l:'Duck',       i:'🦆',fn:duck},
  {l:'Chicken',    i:'🐔',fn:chicken},
  {l:'Monkey',     i:'🐒',fn:monkey},
  {l:'Success!',   i:'🏆',fn:success},
  {l:'Buzzer',     i:'❌',fn:buzzer},
  {l:'Beep',       i:'🔔',fn:beep},
];

const grid=document.getElementById('grid');
SOUNDS.forEach(({l,i,fn},idx)=>{
  const btn=document.createElement('button');
  btn.className=`snd-btn c${idx}`;
  btn.innerHTML=`<span class="snd-icon">${i}</span><span class="snd-label">${l}</span>`;

  let cd=false;
  btn.addEventListener('click',e=>{
    if(cd)return; cd=true; setTimeout(()=>cd=false,300);
    fn();
    btn.classList.remove('flash');
    void btn.offsetWidth;
    btn.classList.add('flash');
    // ripple
    const r=document.createElement('span');
    r.className='ripple';
    const rc=btn.getBoundingClientRect();
    const sz=Math.max(rc.width,rc.height);
    r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rc.left-sz/2}px;top:${e.clientY-rc.top-sz/2}px`;
    btn.appendChild(r);
    setTimeout(()=>r.remove(),600);
  });
  grid.appendChild(btn);
});

// ── TIMER ─────────────────────────────────────────────────
let total=60,remain=60,iv=null,running=false;
const disp=document.getElementById('disp');
const overMsg=document.getElementById('overMsg');
const startBtn=document.getElementById('startBtn');
const pauseBtn=document.getElementById('pauseBtn');
const prog=document.getElementById('prog');

function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}

function refresh(){
  disp.textContent=fmt(remain);
  disp.className='timer-display';
  prog.className='prog-bar';
  if(remain<=0){disp.classList.add('done');}
  else if(remain<=10){disp.classList.add('danger');prog.classList.add('danger');}
  else if(remain<=30){disp.classList.add('warn');prog.classList.add('warn');}
  const pct=total>0?(remain/total)*100:0;
  prog.style.width=pct+'%';
}

function clearActive(){
  document.querySelectorAll('.pst-btn').forEach(b=>b.classList.remove('active-preset'));
}

function setPreset(s,el){
  if(running)return;
  total=s;remain=s;
  clearActive();if(el)el.classList.add('active-preset');
  overMsg.style.display='none';
  refresh();
}

function setCustom(){
  if(running)return;
  const v=parseInt(document.getElementById('secInput').value);
  if(v>0){total=v;remain=v;clearActive();overMsg.style.display='none';refresh();}
}

function startTimer(){
  if(running||remain<=0)return;
  running=true;startBtn.style.display='none';pauseBtn.style.display='flex';
  iv=setInterval(()=>{
    remain--;refresh();
    if(remain<=0){
      clearInterval(iv);running=false;
      disp.classList.add('done');
      overMsg.style.display='block';
      startBtn.style.display='flex';pauseBtn.style.display='none';
      timerEndSound();
    }
  },1000);
}

function pauseTimer(){
  if(!running)return;
  clearInterval(iv);running=false;
  startBtn.style.display='flex';pauseBtn.style.display='none';
}

function resetTimer(){
  clearInterval(iv);running=false;remain=total;
  overMsg.style.display='none';
  startBtn.style.display='flex';pauseBtn.style.display='none';
  refresh();
}

document.getElementById('secInput').addEventListener('keydown',e=>{if(e.key==='Enter')setCustom();});

function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

refresh();
</script>
</body>
</html>
